name: "Bug report"
description: "Create a report to help us fix a problem"
title: "bug: "
labels: ["type:bug", "status:needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.

        Please provide as much detail as possible so we can reproduce it quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: "Pre-check"
      options:
        - label: "I searched existing issues and this bug has not been reported yet"
          required: true
        - label: "I can reproduce this issue consistently"
          required: false

  - type: textarea
    id: summary
    attributes:
      label: "Bug summary"
      description: "What is happening?"
      placeholder: "A clear and concise description of the bug."
    validations:
      required: true

  - type: textarea
    id: repro_steps
    attributes:
      label: "Steps to reproduce"
      description: "List the exact steps."
      placeholder: "A clear and concise way to reproduce the bug"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      placeholder: "What should happen instead?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      placeholder: "What actually happened?"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      description: "How bad is the impact?"
      options:
        - "Critical (service down, data loss)"
        - "High (major feature broken)"
        - "Medium (partial impact, workaround exists)"
        - "Low (minor issue)"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "How urgently should this be handled?"
      options:
        - "P0 - Immediate"
        - "P1 - This week"
        - "P2 - Next iteration"
        - "P3 - Backlog"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs or error output"
      description: "Paste relevant logs or stack traces."
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: "Additional context"
      description: "Anything else we should know?"